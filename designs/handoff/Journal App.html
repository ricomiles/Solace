<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Journal — Earth-tone iOS app</title>
  <link rel="stylesheet" href="tokens.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #f0eee9; font-family: var(--sans); }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="screens-v2.jsx"></script>
  <script type="text/babel">
    function Phone({ children, dark = false }) {
      return (
        <div style={{
          width: 402, height: 874, borderRadius: 54, overflow: 'hidden',
          position: 'relative', background: dark ? '#000' : '#FAF5EC',
          boxShadow: 'inset 0 0 0 1px rgba(58,51,43,0.08)',
        }}>
          <div style={{
            position: 'absolute', top: 12, left: '50%', transform: 'translateX(-50%)',
            width: 122, height: 36, borderRadius: 22, background: '#1a1612', zIndex: 100,
          }} />
          {children}
        </div>
      );
    }

    function App() {
      return (
        <DesignCanvas>
          <DCSection id="onboarding" title="Onboarding" subtitle="First impression">
            <DCArtboard id="onb-welcome" label="Welcome" width={402} height={874}>
              <Phone><Onboarding /></Phone>
            </DCArtboard>
          </DCSection>

          <DCSection id="home" title="Home — entries list" subtitle="Editorial paper (your pick)">
            <DCArtboard id="home-editorial" label="Home" width={402} height={874}>
              <Phone><HomeEditorial /></Phone>
            </DCArtboard>
          </DCSection>

          <DCSection id="calendar" title="Calendar" subtitle="Month grid with mood-coloured days">
            <DCArtboard id="cal-month" label="Month view" width={402} height={874}>
              <Phone><CalendarMonth /></Phone>
            </DCArtboard>
          </DCSection>

          <DCSection id="mood" title="Mood check-in" subtitle="Step before writing — sets the tone">
            <DCArtboard id="mood-checkin" label="Mood picker" width={402} height={874}>
              <Phone><MoodCheckIn /></Phone>
            </DCArtboard>
          </DCSection>

          <DCSection id="write" title="Writing view" subtitle="Both kept — focused paper + guided prompt">
            <DCArtboard id="write-prompted" label="Guided / prompted" width={402} height={874}>
              <Phone><WritePrompted /></Phone>
            </DCArtboard>
            <DCArtboard id="write-focus" label="Focused paper" width={402} height={874}>
              <Phone><WriteFocus /></Phone>
            </DCArtboard>
          </DCSection>

          <DCSection id="read" title="Entry detail" subtitle="Re-reading what you wrote">
            <DCArtboard id="read-entry" label="Book-like detail" width={402} height={874}>
              <Phone><ReadEntry /></Phone>
            </DCArtboard>
          </DCSection>

          <DCSection id="search" title="Search" subtitle="Find a past entry by word or tag">
            <DCArtboard id="search-results" label="Search & filter" width={402} height={874}>
              <Phone><SearchView /></Phone>
            </DCArtboard>
          </DCSection>

          <DCSection id="profile" title="You / settings" subtitle="Profile, practice, privacy">
            <DCArtboard id="settings" label="Profile & settings" width={402} height={874}>
              <Phone><SettingsView /></Phone>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
